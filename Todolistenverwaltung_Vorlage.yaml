openapi: 3.0.1

info:
  title: Todo-Listen-Verwaltung
  description: API zur Verwaltung von Todo-Listen und Einträgen
  contact:
    email: leon.schmidt605@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.1.0

servers:
  - url: http://127.0.0.1:5000/

tags:
  - name: Listenverwaltung
  - name: Eintragsverwaltung

paths:
  /list:
    get:
      tags:
        - Listenverwaltung
      summary: Get all todo lists
      operationId: getLists
      responses:
        "200":
          description: Lists returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoList'

    post:
      tags:
        - Listenverwaltung
      summary: Add new list
      operationId: addList
      requestBody:
        description: list object
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoList'
      responses:
        "200":
          description: List added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoList'
        "500":
          description: List could not be added
          content: {}
      x-codegen-request-body-name: body

  /list/{list_id}:
    get:
      tags:
        - Listenverwaltung
      summary: Get all items from list
      operationId: getList
      parameters:
        - name: list_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List items returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoEntry'
        "404":
          description: Invalid list id
          content: {}

    delete:
      tags:
        - Listenverwaltung
      summary: Delete a list
      operationId: deleteList
      parameters:
        - name: list_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List was deleted
          content: {}
        "404":
          description: Invalid list id
          content: {}

  /list/{list_id}/entry:
    post:
      tags:
        - Eintragsverwaltung
      summary: Add entry to list
      operationId: addEntry
      parameters:
        - name: list_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoEntry'
      responses:
        "200":
          description: Entry added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoEntry'
        "404":
          description: Invalid list id
          content: {}

  /entry/{entry_id}:
    put:
      tags:
        - Eintragsverwaltung
      summary: Update a todo entry
      operationId: updateEntry
      parameters:
        - name: entry_id
          in: path
          required: true
          
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoEntry'
      responses:
        "200":
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoEntry'
        "404":
          description: Invalid entry id
          content: {}

    delete:
      tags:
        - Eintragsverwaltung
      summary: Delete a todo entry
      operationId: deleteEntry
      parameters:
        - name: entry_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Entry deleted
          content: {}
        "404":
          description: Invalid entry id
          content: {}

components:
  schemas:
    TodoList:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    TodoEntry:
      type: object
      required:
        - name
        - list_id
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        user_id:
          type: string
          format: uuid
        list_id:
          type: string
          format: uuid
        done:
          type: boolean